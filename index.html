<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- BOOTSTRAP CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>::: Task Flow :::</title>
</head>

<body>
  <nav class="navbar navbar-light bg-dark">
    <a href="/" class="navbar-brand text-white ms-4">Task Flow</a>
  </nav>

  <div class="container">
    <div id="app" class="row mt-4">
      <div class="col-md-4">
        <div class="card">
          <div class="card-header">
            <h4>Agregar Tarea</h4>
          </div>
          <form id="task-form" class="card-body">
            <div class="form-group mb-3">
              <input type="text" id="name" placeholder="Usuario" class="form-control" />
            </div>
            <div class="form-group mb-3">
              <textarea id="description" name="description" placeholder="Descripción" class="form-control"></textarea>
            </div>
            <input type="submit" value="Guardar" class="btn btn-primary w-100 rounded-5">
          </form>
        </div>
      </div>
      <div class="col-md-8 mt-4 mt-md-0">
        <div id="task-list" class="card">
          <div class="card-header">
            <h4>Lista de Tareas</h4>
          </div>
          <div class="card-body p-0">
            <table class="table table-striped mb-0">
              <thead class="table-light text-center">
                <tr>
                  <th>Nombre</th>
                  <th>Descripción</th>
                  <th>Estado</th>
                  <th>Acción</th>
                </tr>
              </thead>
              <tbody id="task-table-body">

              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/main.js"></script>
</body>

</html>
